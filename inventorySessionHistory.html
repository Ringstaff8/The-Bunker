<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>

    body{
      font-family:Arial,sans-serif;
      margin:20px;
    }

    h2{
      margin-top:0;
    }

    .summaryBar{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .card{
      flex:1;
      min-width:170px;
      border:1px solid #ccc;
      border-radius:8px;
      padding:12px;
      text-align:center;
      background:#f8f9fa;
    }

    .card h3{
      margin:6px 0 0;
      font-size:26px;
      color:#1a73e8;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#1a73e8;
      color:white;
      padding:8px;
      text-align:left;
    }

    td{
      padding:8px;
      border-bottom:1px solid #ddd;
    }

    tr:nth-child(even){
      background:#f9f9f9;
    }

    tr:hover{
      background:#eef5ff;
    }

    .completed{
      color:green;
      font-weight:bold;
    }

    .open{
      color:#d48b00;
      font-weight:bold;
    }

    .buttons{
      margin-top:20px;
      text-align:right;
    }

    button{
      padding:8px 16px;
      margin-left:10px;
    }

  </style>

</head>

<body>

<h2>Inventory Session History Report</h2>

<div id="summaryBar" class="summaryBar">
</div>

<table>

<thead>

<tr>

<th>Session ID</th>
<th>Started</th>
<th>Started By</th>
<th>Status</th>
<th>Last Updated</th>
<th>Completed</th>

</tr>

</thead>

<tbody id="reportBody">

<tr>

<td colspan="6">
Loading...
</td>

</tr>

</tbody>

</table>

<div class="buttons">

<button onclick="window.print()">
Print
</button>

<button onclick="google.script.host.close()">
Close
</button>

</div>

<script>

function formatDate(value) {

  if (!value) return "";

  return new Date(value).toLocaleString();

}

function displayReport(report) {

  //--------------------------------------------------
  // Summary Cards
  //--------------------------------------------------

  const summaryBar = document.getElementById("summaryBar");

  summaryBar.innerHTML = `

    <div class="card">
      <div>Total Sessions</div>
      <h3>${report.summary.totalSessions}</h3>
    </div>

    <div class="card">
      <div>Open Sessions</div>
      <h3>${report.summary.openSessions}</h3>
    </div>

    <div class="card">
      <div>Completed</div>
      <h3>${report.summary.completedSessions}</h3>
    </div>

    <div class="card">
      <div>Last Inventory</div>
      <h3 style="font-size:18px;">
        ${report.summary.lastInventory || "None"}
      </h3>
    </div>

  `;

  //--------------------------------------------------
  // Detail Table
  //--------------------------------------------------

  const tbody = document.getElementById("reportBody");

  tbody.innerHTML = "";

  if (!report.sessions || report.sessions.length === 0) {

    tbody.innerHTML = `
      <tr>
        <td colspan="6" style="text-align:center;">
          No inventory sessions found.
        </td>
      </tr>
    `;

    return;

  }

  report.sessions.forEach(function(session) {

    const row = document.createElement("tr");

    row.innerHTML = `

      <td>${session.sessionId}</td>

      <td>${formatDate(session.started)}</td>

      <td>${session.startedBy}</td>

      <td class="${session.status === "COMPLETED" ? "completed" : "open"}">
        ${session.status}
      </td>

      <td>${formatDate(session.lastUpdated)}</td>

      <td>${formatDate(session.completed)}</td>

    `;

    tbody.appendChild(row);

  });

}

function showError(error) {

  alert(
    "The Inventory Session History Report could not be generated.\n\n" +
    error.message
  );

}

function loadReport() {

  google.script.run
    .withSuccessHandler(displayReport)
    .withFailureHandler(showError)
    .getInventorySessionHistoryReport();

}

loadReport();

</script>


</body>

</html>
