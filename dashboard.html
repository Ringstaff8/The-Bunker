<!DOCTYPE html>
<html>
<head>

  <base target="_top">

  <?!= HtmlService.createHtmlOutputFromFile('styles').getContent(); ?>

</head>

<body>

<div class="container">
 <div class="adminControls">
    <button id="adminButton" onclick="adminLogin()">🔒 Admin Mode</button>
</div>

    <div class="dashboardHeader">
      
       

    <div class="logoArea">

        <img id="bunkerLogo"
     src="https://placehold.co/110x110?text=Logo"
     alt="The Bunker Logo">

    </div>

    <h1 id="dashboardTitle">THE BUNKER</h1>

<h3 id="dashboardSubtitle">
    Inventory & Point of Sale
</h3>

<p class="statusMessage" id="statusMessage">
    Ready for another great day!
</p>
</div>

   

    <div class="dashboard-grid">

        <div class="tile">
            <h2 id="todaysSales">$0.00</h2>
            <p>Today's Sales</p>
        </div>

        <div class="tile">
            <h2 id="todaysProfit">$0.00</h2>
            <p>Today's Profit</p>
        </div>

        <div class="tile">
            <h2 id="inventoryValue">$0.00</h2>
            <p>Inventory Value</p>
        </div>

        <div class="tile">
            <h2 id="products">0</h2>
            <p>Products</p>
        </div>

        <div class="tile">
            <h2 id="lowStock">0</h2>
            <p>Low Stock</p>
        </div>

        <div class="tile">
            <h2 id="promoToday">0</h2>
            <p>Promotional Today</p>
        </div>

    </div>

    <div class="dashboardSection">

        <h2>⚠ Alerts</h2>

        <div id="dashboardAlerts">

            <ul>
                <li>Loading alerts...</li>
            </ul>

        </div>

    </div>

    <div class="dashboardSection">

        <h2>⚡ Quick Actions</h2>

        <div class="quickActions">

           <button onclick="openSales()">🛒 Ring Up Sale</button>

<button id="promoButton" onclick="openPromotional()">🎁 Promotional</button>

<button id="productsButton" onclick="openProducts()">📦 Products</button>



        </div>

    </div>

    <div class="dashboardSection">

        <h2>🕒 Recent Activity</h2>

        <div id="recentActivity">

            <ul>
                <li>Loading activity...</li>
            </ul>

        </div>

    </div>

</div>

<script>

window.onload = function () {

    // Dashboard loading state
   document.getElementById("statusMessage").textContent =
    "Loading dashboard...";

    document.getElementById("dashboardAlerts").innerHTML =
        "<p>Loading alerts...</p>";

    document.getElementById("recentActivity").innerHTML =
        "<p>Loading recent activity...</p>";

    google.script.run
        .withSuccessHandler(loadDashboard)
        .withFailureHandler(function (error) {

        document.getElementById("statusMessage").textContent =
    "Unable to load dashboard.";

            document.getElementById("dashboardAlerts").innerHTML =
                "<p>Dashboard data could not be loaded.</p>";

            document.getElementById("recentActivity").innerHTML =
                "<p>No activity available.</p>";

            console.error("Dashboard Error:", error);

        })
        .getDashboardStats();
        document.getElementById("promoButton").style.display = "none";
document.getElementById("productsButton").style.display = "none";

};

function loadDashboard(stats){


    document.getElementById("products").innerHTML =
        stats.totalProducts;

    document.getElementById("inventoryValue").innerHTML =
        "$" + Number(stats.inventoryValue).toFixed(2);

    document.getElementById("lowStock").innerHTML =
        stats.lowStock;

    document.getElementById("todaysSales").innerHTML =
        "$" + Number(stats.todaysSales).toFixed(2);

    document.getElementById("todaysProfit").innerHTML =
        "$" + Number(stats.todaysProfit).toFixed(2);

    document.getElementById("promoToday").innerHTML =
        stats.promotionalToday;

    // -----------------------------
    // Status Message
    // -----------------------------

    document.querySelector(".statusMessage").textContent =
        stats.statusMessage;

    // -----------------------------
    // Alerts
    // -----------------------------

    const alertContainer =
        document.getElementById("dashboardAlerts");

    let html = "<ul>";

    stats.alerts.forEach(function(alert){

        html += "<li>" + alert + "</li>";

    });

    html += "</ul>";

    alertContainer.innerHTML = html;

// -----------------------------
// Recent Activity
// -----------------------------

const activityContainer =
    document.getElementById("recentActivity");

let activityHtml = "";

stats.recentActivity.forEach(function(item) {

    // Only show the time portion
    const displayTime = item.time;

    let icon = "🛒";

    if (item.transactionType === "Promotional") {
        icon = "🎁";
    } else if (item.transactionType === "Inventory Adjustment") {
        icon = "📦";
    }

    activityHtml += `

        <div class="activityCard">

            <div class="activityHeader">

                <div class="activityType">
                    ${icon} ${item.transactionType}
                </div>

                <div class="activityTime">
                    ${displayTime}
                </div>

            </div>

            <div class="activityProduct">
                ${item.productName}
            </div>

            <div class="activityFooter">
                Qty: ${item.quantity}
            </div>

        </div>

    `;

});

activityContainer.innerHTML = activityHtml;
}


function openSales() {

    google.script.run.showSales();

}

function openPromotional() {
    google.script.run.showPromotional();
}

function openProducts() {
    google.script.run.showProducts();
}

let isAdmin = false;

function adminLogin() {

    // Already in Admin Mode? Log out.
    if (isAdmin) {

        isAdmin = false;

        document.getElementById("adminButton").textContent =
            "🔒 Admin Mode";

        document.getElementById("promoButton").style.display =
            "none";

        document.getElementById("productsButton").style.display =
            "none";

        return;
    }

    // Open the login modal
    document.getElementById("modalOverlay").style.display = "flex";

    document.getElementById("adminPassword").value = "";

    document.getElementById("adminError").style.display = "none";

}

</script>

<?!= HtmlService.createHtmlOutputFromFile('javascript').getContent(); ?>
<?!= HtmlService.createHtmlOutputFromFile('styles').getContent(); ?>



</body>
</html>
