<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <?!= HtmlService.createHtmlOutputFromFile('styles').getContent(); ?>

</head>

<body>

<div class="container">

    <div class="dashboardHeader">

        <h2>Product Maintenance</h2>

        <button id="addProductButton">
    + Add Product
</button>

    </div>

    <div class="searchBar">

        <input
            id="searchBox"
            type="text"
            placeholder="Search Products..."
            onkeyup="searchProducts()">

    </div>

    <table id="productTable">

        <thead>

            <tr>

                <th>SKU</th>
                <th>Product</th>
                <th>Category</th>
                <th>On Hand</th>
                <th>Actions</th>

            </tr>

        </thead>

        <tbody id="productBody">

        </tbody>

    </table>

</div>
<!-- Add Product Modal -->
<div id="addProductModal" class="modal" style="display:none;">

  <div class="modalContent">

    <h2 id="productModalTitle">Add New Product</h2>

    <table class="formTable">

      <tr>
        <td>SKU</td>
        <td><input type="text" id="sku"></td>
      </tr>

    <tr>
  <td>Category</td>
  <td>
    <select id="category"></select>
  </td>
</tr>

     <tr>
  <td>Collection</td>
  <td>
    <select id="collection"></select>
  </td>
</tr>

      <tr>
  <td>Design</td>
  <td><input type="text" id="design"></td>
</tr>

<tr>
  <td>Track Size</td>
  <td>
    <input type="checkbox" id="trackSize">
  </td>
</tr>

      <tr>
        <td>Product Name</td>
        <td><input type="text" id="name"></td>
      </tr>

      <tr>
  <td>Size</td>
  <td>
    <select id="size"></select>
  </td>
</tr>

      <tr>
        <td>Cost</td>
        <td><input type="number" id="cost" step="0.01"></td>
      </tr>

      <tr>
        <td>Price</td>
        <td><input type="number" id="price" step="0.01"></td>
      </tr>

      <tr>
        <td>On Hand</td>
        <td><input type="number" id="onHand"></td>
      </tr>

      <tr>
  <td>Active</td>
  <td>
    <input type="checkbox" id="active" checked>
  </td>
</tr>

      <tr>
        <td>Reorder Level</td>
        <td><input type="number" id="reorder"></td>
      </tr>

      <tr>
  <td>Vendor</td>
  <td>
    <select id="vendor"></select>
  </td>
</tr>

      <tr>
        <td>Notes</td>
        <td><textarea id="notes"></textarea></td>
      </tr>

    </table>

    <br>

    <button id="saveProductButton" onclick="saveProduct()">
  Save Product
</button>

    <button onclick="closeAddProduct()">
      Cancel
    </button>

  </div>

</div>


<script>

let products = [];

let editMode = false;
let editingProductId = "";

function loadProducts(){

    google.script.run
        .withSuccessHandler(showProducts)
        .getActiveProducts();

}

function showProducts(data){

    products = data;

    renderProducts(products);

}

function renderProducts(list){

    const body = document.getElementById("productBody");

    body.innerHTML = "";

    list.forEach(product => {

        body.innerHTML += `

        <tr>

            <td>${product[1]}</td>
            <td>${product[5]}</td>
            <td>${product[2]}</td>
            <td>${product[9]}</td>

            <td>

               <button onclick="editProduct('${product[0]}')">
    Edit
</button>

                <button onclick="comingSoon()">

                    Deactivate

                </button>

            </td>

        </tr>

        `;

    });

}

function searchProducts(){

    const search = document
        .getElementById("searchBox")
        .value
        .toLowerCase();

    const filtered = products.filter(product =>

        product.join(" ").toLowerCase().includes(search)

    );

    renderProducts(filtered);

}

function comingSoon(){

    alert("This feature will be implemented in the next Beta 1.1 step.");

}

window.onload = function () {

    loadProducts();

    document
        .getElementById("addProductButton")
        .addEventListener("click", openAddProduct);

    google.script.run
        .withSuccessHandler(values => loadDropdown("category", values))
        .getUniqueProductColumnValues(2);

    google.script.run
        .withSuccessHandler(values => loadDropdown("collection", values))
        .getUniqueProductColumnValues(4);

    google.script.run
        .withSuccessHandler(values => loadDropdown("vendor", values))
        .getUniqueProductColumnValues(13);
        
    google.script.run
    .withSuccessHandler(values => loadDropdown("size", values))
    .getUniqueProductColumnValues(6);

};


function openAddProduct() {

    editMode = false;
    editingProductId = "";

    clearProductForm();

    document.getElementById("productModalTitle").textContent =
        "Add New Product";

    document.getElementById("saveProductButton").textContent =
        "Save Product";

    document.getElementById("addProductModal").style.display = "block";

}

function editProduct(productId) {

    const product = products.find(p =>
    String(p[0]).trim() === String(productId).trim()
);

    if (!product) {
        alert("Product not found.");
        return;
    }

    editMode = true;
    editingProductId = productId;

    document.getElementById("productModalTitle").textContent = "Edit Product";
    document.getElementById("saveProductButton").textContent = "Update Product";

    document.getElementById("sku").value = product[1];
    document.getElementById("category").value = product[2];
    document.getElementById("design").value = product[3];
    document.getElementById("collection").value = product[4];
    document.getElementById("name").value = product[5];
    document.getElementById("size").value = product[6];
    document.getElementById("cost").value = product[7];
    document.getElementById("price").value = product[8];
    document.getElementById("onHand").value = product[9];
 document.getElementById("active").checked =
    String(product[10]).trim() === "Y";

document.getElementById("trackSize").checked =
    String(product[11]).trim() === "Y";
    document.getElementById("reorder").value = product[12];
    document.getElementById("vendor").value = product[13];
    document.getElementById("notes").value = product[14];

    document.getElementById("addProductModal").style.display = "block";
}


function loadDropdown(id, values) {

    const select = document.getElementById(id);

    select.innerHTML = "";

    values.forEach(value => {

        const option = document.createElement("option");

        option.value = value;
        option.text = value;

        select.appendChild(option);

    });

}

function saveProduct() {

  const product = {

    id: editingProductId,

    sku: document.getElementById("sku").value.trim(),
    category: document.getElementById("category").value,
    design: document.getElementById("design").value.trim(),
    collection: document.getElementById("collection").value,
    name: document.getElementById("name").value.trim(),
    size: document.getElementById("size").value,
    cost: document.getElementById("cost").value,
    price: document.getElementById("price").value,
    onHand: document.getElementById("onHand").value,
    active: document.getElementById("active").checked,
    trackSize: document.getElementById("trackSize").checked,
    reorder: document.getElementById("reorder").value,
    vendor: document.getElementById("vendor").value,
    notes: document.getElementById("notes").value.trim()

};

    if (!product.sku) {
        alert("SKU is required.");
        return;
    }

    if (!product.name) {
        alert("Product Name is required.");
        return;
    }

    if (!product.category) {
        alert("Category is required.");
        return;
    }

   const runner = google.script.run
    .withSuccessHandler(productSaved)
    .withFailureHandler(productSaveFailed);

if (editMode) {
    runner.updateProduct(product);
} else {
    runner.addProduct(product);
}
}


function productSaved() {

    const message = editMode
        ? "Product updated successfully."
        : "Product added successfully.";

    editMode = false;
    editingProductId = "";

    closeAddProduct();

    clearProductForm();

    loadProducts();

    setTimeout(() => alert(message), 100);

}


function productSaveFailed(error) {

    alert(error.message);

}

function clearProductForm() {

    document.getElementById("sku").value = "";
    document.getElementById("design").value = "";
    document.getElementById("name").value = "";

    document.getElementById("cost").value = "";
document.getElementById("price").value = "";
document.getElementById("onHand").value = "";
document.getElementById("reorder").value = "";

    document.getElementById("notes").value = "";

    document.getElementById("trackSize").checked = false;
    document.getElementById("active").checked = true;

}

function closeAddProduct() {

    document.getElementById("addProductModal").style.display = "none";

    editMode = false;
    editingProductId = "";

    clearProductForm();

}

</script>

</body>

</html>
