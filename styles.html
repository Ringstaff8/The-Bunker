<style>

/* ==========================================================
   THE BUNKER
   styles.html
   Beta 1.0
   ========================================================== */

:root{

  --primary:#0057B8;      /* Royal Blue */
  --primary-dark:#003D82;
  --success:#28A745;
  --warning:#F39C12;
  --danger:#DC3545;

  --background:#F4F6F9;
  --card:#FFFFFF;

  --text:#222;
  --border:#D8DCE3;

  --radius:12px;

  --shadow:0 3px 10px rgba(0,0,0,.12);

  --transition:.2s;

}

/* ---------- Page ---------- */

body{

    margin:0;
    padding:25px;

    background:var(--background);

    color:var(--text);

    font-family:Arial, Helvetica, sans-serif;

}

.container{

    max-width:1400px;

    margin:auto;

}

h1{

    margin:0 0 20px 0;

    color:var(--primary);

    font-size:32px;

}

h2{

    margin:0;

}

h3{

    margin:0 0 10px;

}

/* ---------- Dashboard ---------- */

.dashboard-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));

    gap:20px;

    margin-bottom:30px;

}

.tile{

    background:white;

    border-radius:var(--radius);

    box-shadow:var(--shadow);

    padding:25px;

    text-align:center;

}

.tile h2{

    color:var(--primary);

    font-size:34px;

}

.tile p{

    margin-top:8px;

    color:#666;

}

/* ---------- Buttons ---------- */

.button-grid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

    margin-bottom:35px;

}

button{

    border:none;

    border-radius:12px;

    cursor:pointer;

    transition:var(--transition);

    font-size:18px;

    font-weight:bold;

}

.main-button{

    background:var(--primary);

    color:white;

    height:120px;

    font-size:22px;

}

.main-button:hover{

    background:var(--primary-dark);

    transform:translateY(-3px);

}

.primary-btn{

    background:var(--primary);

    color:white;

    padding:12px 18px;

}

.success-btn{

    background:var(--success);

    color:white;

    padding:12px 18px;

}

.warning-btn{

    background:var(--warning);

    color:white;

    padding:12px 18px;

}

.danger-btn{

    background:var(--danger);

    color:white;

    padding:12px 18px;

}

/* ---------- Cards ---------- */

.card{

    background:white;

    border-radius:12px;

    box-shadow:var(--shadow);

    padding:20px;

    margin-bottom:20px;

}

/* ---------- Search ---------- */

.search-box{

    width:100%;

    font-size:18px;

    padding:12px;

    border-radius:10px;

    border:1px solid var(--border);

    box-sizing:border-box;

}

/* ---------- Products ---------- */

.product-grid{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));

    gap:15px;

    margin-top:20px;

}

.product-card{

    background:white;

    border-radius:10px;

    box-shadow:var(--shadow);

    padding:18px;

    cursor:pointer;

    transition:.15s;

}

.product-card:hover{

    transform:translateY(-2px);

    background:#EEF5FF;

}

.product-card strong{

    color:var(--primary);

}

/* ---------- Cart ---------- */

.cart{

    background:white;

    border-radius:12px;

    box-shadow:var(--shadow);

    padding:20px;

}

.cart-item{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:10px 0;

    border-bottom:1px solid #eee;

}

.cart-total{

    font-size:24px;

    font-weight:bold;

    color:var(--primary);

    margin-top:15px;

}

/* ---------- Tables ---------- */

table{

    width:100%;

    border-collapse:collapse;

}

th{

    background:var(--primary);

    color:white;

    padding:12px;

}

td{

    padding:10px;

    border-bottom:1px solid #eee;

}

/* ---------- Inputs ---------- */

input,
select{

    width:100%;

    padding:10px;

    border:1px solid var(--border);

    border-radius:8px;

    box-sizing:border-box;

}
/* ---------- Sales Layout ---------- */

.header{

    background:var(--primary);

    color:white;

    padding:20px;

    border-radius:12px;

    font-size:30px;

    font-weight:bold;

    text-align:center;

    margin-bottom:20px;

}

.sales-layout{

    display:grid;

    grid-template-columns:2fr 1fr;

    gap:25px;

    align-items:start;

}

.left-panel{

    display:flex;

    flex-direction:column;

    gap:10px;

}

.right-panel{

    position:sticky;

    top:20px;

}

.collection-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));

    gap:10px;

    margin-top:10px;

}

.cart{

    display:flex;

    flex-direction:column;

    gap:12px;

}

.primary-btn{

    margin:4px;

}

.collection-grid{

    display:grid;

    grid-template-columns:repeat(auto-fit,minmax(120px,1fr));

    gap:10px;

}

.size-grid{

    display:grid;

    grid-template-columns:repeat(4,1fr);

    gap:10px;

}

.product-btn,
.size-btn{

    background:white;

    border:1px solid var(--border);

    padding:15px;

}

.product-btn:hover,
.size-btn:hover{

    background:#EEF5FF;

}

#productResults{

    display:grid;

    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));

    gap:15px;

}
/* ---------- Responsive ---------- */

@media(max-width:900px){

.button-grid{

    grid-template-columns:1fr;

}

.dashboard-grid{

    grid-template-columns:1fr;

}

}
/* ==========================================================
   REPORT FRAMEWORK
   ========================================================== */

.report-title{
    margin:0 0 20px;
    color:var(--primary);
    font-size:28px;
    font-weight:bold;
}

.summaryBar{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
    margin-bottom:20px;
}

.summaryBar .card{
    flex:1;
    min-width:170px;
    text-align:center;
}

.summaryBar .card h3{
    margin:6px 0 0;
    font-size:28px;
    color:var(--primary);
}

.report-buttons{
    margin-top:20px;
    text-align:right;
}

.completed{
    color:var(--success);
    font-weight:bold;
}

.open{
    color:var(--warning);
    font-weight:bold;
}

table tr:nth-child(even){
    background:#f9f9f9;
}

table tr:hover{
    background:#eef5ff;
}

@media print{

    .report-buttons{
        display:none;
    }

    body{
        padding:0;
        background:white;
    }

}
/* ==========================================================
   DASHBOARD MISSION CONTROL
   ========================================================== */

.dashboardHeader{

    text-align:center;

    margin-bottom:30px;

}

.dashboardHeader h1{

    margin:0;

    font-size:40px;

    color:var(--primary);

}

.dashboardHeader h3{

    margin:8px 0;

    color:#555;

    font-weight:normal;

}

.statusMessage{

    display:inline-block;

    margin-top:12px;

    padding:10px 20px;

    background:#EAF4FF;

    border:2px solid var(--primary);

    border-radius:25px;

    color:var(--primary);

    font-weight:bold;

}

/* Dashboard Sections */

.dashboardSection{

    background:var(--card);

    border-radius:var(--radius);

    box-shadow:var(--shadow);

    padding:20px;

    margin-top:25px;

}

.dashboardSection h2{

    color:var(--primary);

    margin-bottom:15px;

}

/* Alerts */

#dashboardAlerts ul{

    margin:0;

    padding-left:22px;

}

#dashboardAlerts li{

    margin:10px 0;

    font-size:16px;

}

/* Quick Actions */

.quickActions{

    display:grid;

    grid-template-columns:repeat(2,1fr);

    gap:15px;

}

.quickActions button{

    background:var(--primary);

    color:white;

    padding:16px;

    border:none;

    border-radius:10px;

    font-size:18px;

    font-weight:bold;

    transition:var(--transition);

}

.quickActions button:hover{

    background:var(--primary-dark);

    transform:translateY(-2px);

}

.quickActions button:disabled{

    background:#B9C2CF;

    cursor:default;

    transform:none;

}

/* Recent Activity */

#recentActivity ul{

    margin:0;

    padding-left:22px;

}

#recentActivity li{

    margin:10px 0;

}

/* Mobile */

@media(max-width:700px){

    .quickActions{

        grid-template-columns:1fr;

    }

}

/* ---------- Dashboard Logo ---------- */

.logoArea{

    display:flex;

    justify-content:center;

    margin-bottom:15px;

}

#bunkerLogo{

    width:110px;

    height:110px;

    object-fit:contain;

}

</style>
