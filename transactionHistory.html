<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>

    body{
      font-family:Arial,sans-serif;
      margin:20px;
    }

    h2{
      margin-top:0;
    }

    .summaryBar{
      display:flex;
      gap:20px;
      margin-bottom:20px;
    }

    .summaryCard{
      background:#f3f6fb;
      border:1px solid #d6dce8;
      border-radius:8px;
      padding:12px 18px;
      font-weight:bold;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th,td{
      border:1px solid #ddd;
      padding:8px;
      text-align:left;
    }

    th{
      background:#f5f5f5;
      cursor:pointer;
    }

    tr:nth-child(even){
      background:#fafafa;
    }

  </style>

</head>

<body>

<h2>📜 Transaction History</h2>

<div class="summaryBar">

  <div class="summaryCard">
    Transactions:
    <span id="transactionCount">0</span>
  </div>

</div>

<table id="transactionTable">

<thead>

<tr>

<th>Date</th>
<th>Type</th>
<th>SKU</th>
<th>Product</th>
<th>Qty</th>
<th>Amount</th>
<th>Profit</th>
<th>Notes</th>

</tr>

</thead>

<tbody>

<tr>

<td colspan="8">Loading...</td>

</tr>

</tbody>

</table>

<script>

let reportData = [];

google.script.run
  .withSuccessHandler(function(data){

      reportData = data || [];

      document.getElementById("transactionCount").innerText =
          reportData.length;

      renderTable();

  })
  .withFailureHandler(function(error){

      console.error(error);

      alert(error.message);

  })
  .getTransactionHistory();

function loadTransactions(data){

    reportData = data || [];

    document.getElementById("transactionCount").innerText =
        reportData.length;

    renderTable();

}

function renderTable() {

    const tbody =
        document.querySelector("#transactionTable tbody");

    tbody.innerHTML = "";

    if (reportData.length === 0) {

        tbody.innerHTML = `
        <tr>
            <td colspan="8" style="text-align:center;">
                No transactions found.
            </td>
        </tr>`;

        return;

    }

    reportData.forEach(function(item) {

        tbody.innerHTML += `

        <tr>

            <td>${item.date}</td>

            <td>${item.transactionType}</td>

            <td>${item.sku}</td>

            <td>${item.design} ${item.productName}</td>

            <td>${item.quantity}</td>

            <td>$${Number(item.price).toFixed(2)}</td>

            <td>$${Number(item.profit).toFixed(2)}</td>

            <td>${item.notes}</td>

        </tr>

        `;

    });

}


function showError(error){

    console.error(error);

    alert(error.message);

}

</script>

</body>

</html>
