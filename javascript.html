<script>

let currentProducts = [];
let cart = [];

/* ==========================================
   SEARCH
========================================== */

function searchProducts(){

    const text =
        document.getElementById("searchBox").value;

    google.script.run

        .withSuccessHandler(showProducts)

        .getSearchResults(text);

}

function showProducts(products){

    currentProducts = products;

    const results =
        document.getElementById("productResults");

    results.innerHTML = "";

    if(products.length===0){

        results.innerHTML =
        "<p>No matching products.</p>";

        return;

    }

    products.forEach(product=>{

        const card =
            document.createElement("div");

        card.className = "product-card";

        card.onclick = ()=>addToCart(product);

        card.innerHTML =

            "<strong>"+product[5]+"</strong><br>"+

            product[4]+" | "+

            product[6]+"<br>"+

            "$"+Number(product[8]).toFixed(2)+

            " | On Hand: "+product[9];

        results.appendChild(card);

    });

}

/* ==========================================
   CART
========================================== */

function addToCart(product){

    const existing =
    cart.find(item => item.sku == product[1]);

    if(existing){

        existing.qty++;

    }else{

        cart.push({

    id: product[0],
    sku: product[1],
    category: product[2],
    design: product[3],
    collection: product[4],
    name: product[5],
    size: product[6],
    cost: Number(product[7]),
    price: Number(product[8]),
    qty: 1


        });

    }

    refreshCart();

}

function refreshCart(){

    const cartDiv =
        document.getElementById("cartItems");

    cartDiv.innerHTML="";

    let total=0;

    let count=0;

    cart.forEach(item=>{

        total += item.price*item.qty;

        count += item.qty;

        const div =
            document.createElement("div");

       div.innerHTML =

"<div>" +

"<strong>" + item.name + "</strong><br>" +

item.collection + " " + item.size +

"</div>" +

"<div style='text-align:right;'>" +

"<button onclick='decreaseQty(\"" + item.sku + "\")'>−</button> " +

"<strong>" + item.qty + "</strong> " +

"<button onclick='increaseQty(\"" + item.sku + "\")'>+</button><br>" +

"$" + item.price.toFixed(2) + " each<br>" +

"<button onclick='removeFromCart(\"" + item.sku + "\")'>🗑 Remove</button>" +

"</div>";


        cartDiv.appendChild(div);

    });

    document.getElementById("itemCount").innerHTML=count;

    document.getElementById("subtotal").innerHTML=total.toFixed(2);

    document.getElementById("tax").innerHTML="0.00";

    document.getElementById("total").innerHTML=total.toFixed(2);

}
function increaseQty(sku){

    const item = cart.find(item => item.sku === sku);

    if(item){

        item.qty++;

        refreshCart();

    }

}

function decreaseQty(sku){

    const item = cart.find(item => item.sku === sku);

    if(!item) return;

    if(item.qty > 1){

        item.qty--;

        refreshCart();

    }else{

        removeFromCart(sku);

    }

}
function completeSale(paymentType){

    if(cart.length === 0){

        alert("Cart is empty.");

        return;

    }

    google.script.run
        .withSuccessHandler(function(){

            alert("Sale completed successfully!");

            cart = [];

            refreshCart();

            searchProducts();

        })
        .withFailureHandler(function(error){

            alert("Error: " + error.message);

        })
        .saveSale(cart, paymentType);

}

</script>
