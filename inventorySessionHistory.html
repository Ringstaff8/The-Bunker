<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <style>

    body{
      font-family:Arial,sans-serif;
      margin:20px;
    }

    h2{
      margin-top:0;
    }

    .summaryBar{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:20px;
    }

    .card{
      flex:1;
      min-width:170px;
      border:1px solid #ccc;
      border-radius:8px;
      padding:12px;
      text-align:center;
      background:#f8f9fa;
    }

    .card h3{
      margin:6px 0 0;
      font-size:26px;
      color:#1a73e8;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#1a73e8;
      color:white;
      padding:8px;
      text-align:left;
    }

    td{
      padding:8px;
      border-bottom:1px solid #ddd;
    }

    tr:nth-child(even){
      background:#f9f9f9;
    }

    tr:hover{
      background:#eef5ff;
    }

    .completed{
      color:green;
      font-weight:bold;
    }

    .open{
      color:#d48b00;
      font-weight:bold;
    }

    .buttons{
      margin-top:20px;
      text-align:right;
    }

    button{
      padding:8px 16px;
      margin-left:10px;
    }

  </style>

</head>

<body>

<h2>Inventory Session History Report</h2>

<div id="summaryBar" class="summaryBar">
</div>

<table>

<thead>

<tr>

<th>Session ID</th>
<th>Started</th>
<th>Started By</th>
<th>Status</th>
<th>Last Updated</th>
<th>Completed</th>

</tr>

</thead>

<tbody id="reportBody">

<tr>

<td colspan="6">
Loading...
</td>

</tr>

</tbody>

</table>

<div class="buttons">

<button onclick="window.print()">
Print
</button>

<button onclick="google.script.host.close()">
Close
</button>

</div>

<script>

function formatDate(value){

  if(!value) return "";

  return new Date(value).toLocaleString();

}

function loadReport() {

  alert("Calling server...");

  google.script.run
    .withSuccessHandler(function(report) {

      alert("SUCCESS HANDLER");

      console.log(report);

      alert(JSON.stringify(report));

    })
    .withFailureHandler(function(err) {

  console.error(err);

  alert(
    "SERVER ERROR\n\n" +
    JSON.stringify(err, null, 2)
  );

})
    .getInventorySessionHistoryReport();

}

loadReport();

</script>


</body>

</html>
