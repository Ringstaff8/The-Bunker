<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <?!= include('styles'); ?>
  <?!= include('javascript'); ?>

  <title>The Bunker - Ring Up Sale</title>

</head>

<body>

<div class="header">

    🛒 THE BUNKER

    <br>

    <span style="font-size:18px;font-weight:normal;">

        Ring Up Sale

    </span>

</div>

<div class="sales-layout">

    <!-- LEFT SIDE -->

    <div class="left-panel">

        <h2>🔍 Search Products</h2>

        <input

id="searchBox"

type="text"

placeholder="Search products..."

onkeyup="searchProducts()"

><div
id="productResults"
style="margin-top:20px;">
</div>

        <br><br>

        <h2>Browse Collections</h2>

        <div class="collection-grid">
            </div> <!-- End left-panel -->

            <button onclick="searchCollection('School Spirit')">
    School Spirit
</button>

           <button onclick="searchCollection('Altruismo')">
    🖤 Altruismo
</button>

<button onclick="searchCollection('Amistad')">
    ❤️ Amistad
</button>

<button onclick="searchCollection('Isibindi')">
    💚 Isibindi
</button>

<button onclick="searchCollection('Reveur')">
    💙 Reveur
</button>
        

        </div>


    <!-- RIGHT SIDE -->

    <div class="right-panel">

        <div class="cart">

            <div class="cart-title">

                🛒 Current Cart

            </div>

            <div id="cartItems">

                <div class="cart-item">

                    <span>No items added.</span>

                </div>

            </div>

            <hr>

            <p><strong>Items:</strong> <span id="itemCount">0</span></p>

            <p><strong>Subtotal:</strong> $<span id="subtotal">0.00</span></p>

            <p><strong>Tax:</strong> $<span id="tax">0.00</span></p>

            <div class="cart-total">

                Total: $<span id="total">0.00</span>

            </div>

            <br>

            <h3>Payment</h3>

            <button
class="primary-btn"
onclick="completeSale('Cash')">

💵 Cash

</button>

            <button
class="primary-btn"
onclick="completeSale('Card')">

💳 Card

</button>

           <button
class="primary-btn"
onclick="completeSale('Online')">

🌐 Online

</button>

            <br>

            <button
class="success-btn primary-btn"
onclick="completeSale('Promotional')">

🎁 Promotional

</button>

<br><br>

<button
class="warning-btn primary-btn"
onclick="saveDraft()">

💾 Save Draft

</button>

<button
class="danger-btn primary-btn"
onclick="clearCart()">

❌ Clear Cart

</button>

    </div>

</div>

<div style="text-align:center;padding:20px;color:#888;font-size:12px;">

    The Bunker v<?= APP.VERSION ?>

</div>

</body>

</html>
