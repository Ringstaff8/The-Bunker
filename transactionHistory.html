<!DOCTYPE html>
<html>
<head>

  <base target="_top">



  <style>

    .summaryBar{
      display:flex;
      gap:20px;
      margin-bottom:20px;
      font-weight:bold;
      font-size:16px;
    }

    .summaryCard{
      background:#f3f6fb;
      padding:12px 18px;
      border-radius:8px;
      border:1px solid #d6dce8;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      cursor:pointer;
    }

    th,td{
      padding:8px;
      border:1px solid #ddd;
      text-align:left;
    }

    tr:nth-child(even){
      background:#fafafa;
    }

    .low{
      color:#c62828;
      font-weight:bold;
    }

  </style>

</head>

<body>

<h2>Low Stock Report</h2>

<div class="summaryBar">

    <div class="summaryCard">
        Products Low:
        <span id="productCount">0</span>
    </div>

    <div class="summaryCard">
        Units Needed:
        <span id="unitsNeeded">0</span>
    </div>

</div>

<table id="reportTable">

<thead>

<tr>

<th onclick="sortTable('sku')">SKU</th>
<th onclick="sortTable('productName')">Product</th>
<th onclick="sortTable('category')">Category</th>
<th onclick="sortTable('collection')">Collection</th>
<th onclick="sortTable('size')">Size</th>
<th onclick="sortTable('onHand')">On Hand</th>
<th onclick="sortTable('reorderLevel')">Reorder Level</th>
<th onclick="sortTable('difference')">Need to Reorder</th>
</tr>

</thead>

<tbody>

<tr>

<td colspan="8">
Loading...
</td>

</tr>

</tbody>

</table>

<script>

let reportData = [];
let sortColumn = "";
let sortAscending = true;

google.script.run
  .withSuccessHandler(function(data) {
    reportData = data;
    renderTable();
  })
  .getLowStockReport();

function renderTable(){
    const data = reportData;
    console.log(data);
console.log(data.length);

    const tbody=document.querySelector("#reportTable tbody");

    tbody.innerHTML="";
    if (data.length === 0) {

  tbody.innerHTML = `
    <tr>
      <td colspan="8" style="text-align:center;padding:25px;">
        🎉 Great news! No products are currently at or below their reorder level.
      </td>
    </tr>
  `;

  document.getElementById("productCount").innerText = 0;
  document.getElementById("unitsNeeded").innerText = 0;

  return;
}

    let totalNeeded=0;

    data.forEach(function(item){

        totalNeeded+=item.difference;

        tbody.innerHTML += `

        <tr>

            <td>${item.sku}</td>

            <td>${item.design} ${item.productName}</td>

            <td>${item.category}</td>

            <td>${item.collection}</td>

            <td>${item.size}</td>

            <td class="low">${item.onHand}</td>

            <td>${item.reorderLevel}</td>

            <td class="low">${item.difference}</td>

        </tr>

        `;

    });

    document.getElementById("productCount").innerText=data.length;

    document.getElementById("unitsNeeded").innerText=totalNeeded;

}

function sortTable(column) {

  if (sortColumn === column) {
    sortAscending = !sortAscending;
  } else {
    sortColumn = column;
    sortAscending = true;
  }

  reportData.sort(function(a, b) {

    let valueA = a[column];
    let valueB = b[column];

    if (typeof valueA === "string") {
      valueA = valueA.toLowerCase();
      valueB = valueB.toLowerCase();
    }

    if (valueA < valueB) return sortAscending ? -1 : 1;
    if (valueA > valueB) return sortAscending ? 1 : -1;

    return 0;

  });

  renderTable();

}

</script>

</body>
</html>
