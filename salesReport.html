<!DOCTYPE html>
<html>

<head>

  <base target="_top">

  <?!= HtmlService.createHtmlOutputFromFile("styles").getContent(); ?>

  <style>

    .reportControls{
      display:flex;
      gap:15px;
      align-items:end;
      margin-bottom:20px;
      flex-wrap:wrap;
    }

    .summaryBar{
      display:flex;
      gap:20px;
      flex-wrap:wrap;
      margin-bottom:25px;
    }

    .summaryCard{
      flex:1;
      min-width:160px;
      background:white;
      border-radius:8px;
      padding:15px;
      box-shadow:0 2px 6px rgba(0,0,0,.15);
      text-align:center;
    }

    .summaryCard h2{
      margin:0;
      color:#1a73e8;
    }

    table{
      width:100%;
      border-collapse:collapse;
    }

    th{
      background:#1a73e8;
      color:white;
      padding:10px;
      cursor:pointer;
    }

    td{
      padding:8px;
      border-bottom:1px solid #ddd;
    }

    tr:nth-child(even){
      background:#f8f8f8;
    }

    .buttonBar{
      margin-top:20px;
      display:flex;
      gap:10px;
    }

    @media print{

      .reportControls,
      .buttonBar{
        display:none;
      }

      body{
        margin:0;
      }

    }

  </style>

</head>

<body>

<h2>💰 Sales Report</h2>

<div class="reportControls">

  <div>
    <label>Start Date</label><br>
    <input type="date" id="startDate">
  </div>

  <div>
    <label>End Date</label><br>
    <input type="date" id="endDate">
  </div>

  <div>
    <button onclick="loadReport()">
      Generate Report
    </button>
  </div>

</div>

<div class="summaryBar">

  <div class="summaryCard">
    <div>Total Revenue</div>
    <h2 id="totalRevenue">$0.00</h2>
  </div>

  <div class="summaryCard">
    <div>Total Profit</div>
    <h2 id="totalProfit">$0.00</h2>
  </div>

  <div class="summaryCard">
    <div>Transactions</div>
    <h2 id="transactionCount">0</h2>
  </div>

  <div class="summaryCard">
    <div>Units Sold</div>
    <h2 id="unitsSold">0</h2>
  </div>

  <div class="summaryCard">
    <div>Average Sale</div>
    <h2 id="averageSale">$0.00</h2>
  </div>

</div>

<table id="salesTable">

<thead>

<tr>

<th>Date</th>
<th>Product</th>
<th>Qty</th>
<th>Revenue</th>
<th>Profit</th>
<th>Payment</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

<div class="buttonBar">

<button onclick="window.print()">
🖨 Print
</button>

<button disabled>
📄 Export CSV (Coming Soon)
</button>

</div>

<script>

function loadReport() {

  const startDate = document.getElementById("startDate").value;
  const endDate = document.getElementById("endDate").value;

  if (!startDate || !endDate) {
    alert("Please select a start date and end date.");
    return;
  }

  google.script.run
    .withSuccessHandler(displaySalesReport)
    .withFailureHandler(showError)
    .getSalesReport(startDate, endDate);

}

function displaySalesReport(report) {

  document.getElementById("totalRevenue").textContent =
    "$" + Number(report.totalRevenue || 0).toFixed(2);

  document.getElementById("totalProfit").textContent =
    "$" + Number(report.totalProfit || 0).toFixed(2);

  document.getElementById("transactionCount").textContent =
    Number(report.totalTransactions || 0);

  document.getElementById("unitsSold").textContent =
    Number(report.totalUnits || 0);

  document.getElementById("averageSale").textContent =
    "$" + Number(report.averageSale || 0).toFixed(2);

  const tbody = document.querySelector("#salesTable tbody");
  tbody.innerHTML = "";

  report.transactions.forEach(function(transaction) {

    const row = document.createElement("tr");

    row.innerHTML = `
      <td>${transaction.date}</td>
      <td>${transaction.productName}</td>
      <td class="number">${Number(transaction.quantity || 0)}</td>
      <td class="number">$${Number(transaction.revenue || 0).toFixed(2)}</td>
      <td class="number">$${Number(transaction.profit || 0).toFixed(2)}</td>
      <td>${transaction.paymentType}</td>
    `;

    tbody.appendChild(row);

  });

}

function showError(error) {

  alert(
    "The Sales Report could not be generated.\n\n" +
    error.message
  );

}

</script>
