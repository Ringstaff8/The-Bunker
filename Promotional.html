<!DOCTYPE html>
<html>
<head>

  <base target="_top">

  <?!= HtmlService.createHtmlOutputFromFile('styles').getContent(); ?>

</head>

<body>

<div class="container">

    <h2>🎁 Promotional Giveaway</h2>

    <div class="card">

        <label><strong>Student Name</strong></label>

        <input
            id="studentName"
            type="text"
            placeholder="Enter student name">

        <br><br>
<label><strong>Product</strong></label>

<select id="product">
    <option value="">Loading...</option>
</select>

<br><br>
<label><strong>Quantity</strong></label>

<input
    id="quantity"
    type="number"
    value="1"
    min="1">

<br><br>
        <label><strong>Reason</strong></label>

        <select id="reason">

            <option>New Student</option>
            <option>PBIS Reward</option>
            <option>Staff Appreciation</option>
            <option>School Event</option>
            <option>Other</option>

        </select>

        <br><br>

        <label><strong>Notes (Optional)</strong></label>

        <textarea
            id="notes"
            style="width:100%;height:90px;"></textarea>

        <br><br>

        <button class="success-btn"
                onclick="submitPromo()">
            Complete Giveaway
        </button>

        <button class="danger-btn"
                onclick="google.script.host.close()">
            Cancel
        </button>

    </div>

</div>

<script>

function submitPromo(){

    const promo = {

        student :
            document.getElementById("studentName").value,

        reason :
            document.getElementById("reason").value,

        notes :
            document.getElementById("notes").value

    };

    google.script.run
        .withSuccessHandler(function(){

            google.script.host.close();

        })
        .savePromotionInfo(promo);

}

</script>

</body>
</html>
